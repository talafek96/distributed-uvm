name: CI

on:
  push:
    branches: [main, "pub/**"]
  pull_request:
    branches: [main, "pub/**"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  e2e-kmod:
    name: Kernel module E2E (QEMU)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-arm \
            busybox-static \
            linux-headers-$(uname -r) \
            build-essential \
            binutils \
            cpio \
            gzip \
            zstd \
            file
      - name: Kernel module standalone (16 checks)
        run: bash scripts/test-kmod-qemu.sh
      - name: Kmod + daemon ring buffer (10 checks)
        run: bash scripts/test-kmod-daemon-qemu.sh
      - name: Two-VM distributed (12 checks)
        run: bash scripts/test-distributed-qemu.sh
      - name: Mutual OOM degradation (9 checks)
        run: bash scripts/test-mutual-oom-qemu.sh
